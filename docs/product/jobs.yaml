updated: 2026-06-02
feature_source: phase1-account-management
pivot_note: >
  job-001 (CLI) et job-002 (démo web) remplacés par le nouveau job-001
  suite au pivot du 2026-06-02 — projet requalifié en application web bancaire standard.

jobs:
  - id: job-001
    label: bank-account-web-management
    statement: >
      When I need to manage my bank account,
      I want to perform deposits and withdrawals and view my balance from a browser,
      so I can stay in control of my finances without visiting a branch.
    dimensions:
      functional:
        - Afficher le solde courant dans un navigateur
        - Deposer un montant via un formulaire web (POST /api/deposit)
        - Retirer un montant via un formulaire web (POST /api/withdraw)
        - Voir la confirmation ou l'erreur apres chaque operation sans rechargement de page
        - Empecher un solde negatif (rejet avec message explicite)
      emotional:
        - Se sentir en controle — chaque operation donne un retour immediat
        - Faire confiance au systeme — les montants affiches sont toujours corrects
        - Ne pas avoir peur de faire une erreur — des messages clairs guident la correction
      social:
        - Gerer ses finances de facon autonome sans passer par une agence
        - Acceder a son compte depuis n'importe quel appareil avec un navigateur
    four_forces:
      push: >
        No way to manage account online — must call or visit branch.
        Time-consuming, limited to business hours.
      pull: >
        Instant web access to account balance and transactions from any device.
        Immediate feedback after each operation.
      anxiety: >
        Fear of entering the wrong amount with no confirmation before action.
        Uncertainty about whether the operation succeeded or failed.
      habit: >
        Used to calling the bank or using an ATM — learning a new web interface
        requires trust that the system will handle errors gracefully.
    opportunity_score: 9
    stories:
      - slice-01-ws-balance-api
      - slice-02-deposit-api
      - slice-03-withdrawal-api
      - slice-04-insufficient-funds-api

  - id: job-002
    label: bank-account-transaction-traceability
    statement: >
      When I need to verify that my past deposits and withdrawals were recorded correctly,
      I want to see a chronological statement of my transactions and filter it by date range,
      so I can trust the system's bookkeeping without contacting my branch.
    dimensions:
      functional:
        - Afficher la liste chronologique des transactions (depots et retraits)
        - Filtrer les transactions par plage de dates (de/a)
        - Voir le detail d'une transaction (montant, type, date)
      emotional:
        - Se sentir rassuree — chaque operation passee est tracable et verifiable
        - Faire confiance au systeme — aucune transaction n'est perdue ou modifiee
        - Eviter l'anxiete de devoir contacter la banque pour retrouver une operation
      social:
        - Pouvoir justifier ses mouvements financiers sans intermediaire humain
        - Garder un historique personnel consultable a tout moment depuis le navigateur
    four_forces:
      push: >
        Aucune trace consultable des operations passees — Marie doit se souvenir
        mentalement ou demander un releve papier en agence pour verifier une operation.
      pull: >
        Releve instantane et filtrable depuis le navigateur, disponible immediatement
        apres chaque depot ou retrait, sans attendre un releve mensuel papier.
      anxiety: >
        Peur qu'une transaction ait disparu ou soit incorrecte sans moyen de verifier ;
        doute sur la fiabilite du systeme si l'historique n'est pas consultable.
      habit: >
        Habitude du releve papier mensuel ou de l'appel au conseiller pour retrouver
        une operation — le releve web doit etre au moins aussi complet et comprehensible.
    opportunity_score: 7
    stories:
      - slice-05-ws-statement-api
      - slice-06-date-range-filter
      - slice-07-transaction-detail
