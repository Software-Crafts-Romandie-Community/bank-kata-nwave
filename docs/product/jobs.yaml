jobs:
  - id: job-001
    label: bank-account-web-management
    statement: >
      When I need to manage my bank account,
      I want to perform deposits and withdrawals and view my balance from a browser,
      so I can stay in control of my finances without visiting a branch.
    dimensions:
      functional:
        - Afficher le solde courant dans un navigateur
        - Deposer un montant via un formulaire web (POST /api/deposit)
        - Retirer un montant via un formulaire web (POST /api/withdraw)
        - Voir la confirmation ou l'erreur apres chaque operation sans rechargement de page
        - Empecher un solde negatif (rejet avec message explicite)
      emotional:
        - Se sentir en controle — chaque operation donne un retour immediat
        - Faire confiance au systeme — les montants affiches sont toujours corrects
        - Ne pas avoir peur de faire une erreur — des messages clairs guident la correction
      social:
        - Gerer ses finances de facon autonome sans passer par une agence
        - Acceder a son compte depuis n'importe quel appareil avec un navigateur
    four_forces:
      push: >
        No way to manage account online — must call or visit branch.
        Time-consuming, limited to business hours.
      pull: >
        Instant web access to account balance and transactions from any device.
        Immediate feedback after each operation.
      anxiety: >
        Fear of entering the wrong amount with no confirmation before action.
        Uncertainty about whether the operation succeeded or failed.
      habit: >
        Used to calling the bank or using an ATM — learning a new web interface
        requires trust that the system will handle errors gracefully.
    opportunity_score: 9
    stories:
      - slice-01-ws-balance-api
      - slice-02-deposit-api
      - slice-03-withdrawal-api
      - slice-04-insufficient-funds-api

  - id: job-002
    label: bank-account-statement-consultation
    statement: >
      When I need to understand what happened on my bank account,
      I want to see all my transactions with their type and date from a browser,
      so I can verify my account history and reconcile my finances without calling my bank.
    dimensions:
      functional:
        - Afficher la liste de toutes les transactions (depot et retrait) avec montant et date
        - Acceder au releve depuis le meme navigateur que la gestion de compte (Phase 1)
        - Consulter l'historique via GET /api/statement sans parametre supplementaire
        - Voir les transactions dans un ordre coherent (chronologique inverse — plus recent en premier)
      emotional:
        - Se sentir rassure — les chiffres correspondent a ce que je me rappelle
        - Avoir confiance dans le systeme — rien n'est perdu, tout est trace
        - Ne pas etre submerge — la liste est lisible meme avec plusieurs transactions
      social:
        - Verifier son compte de facon autonome sans devoir appeler son conseiller
        - Avoir une preuve consultable des operations effectuees pendant la session
    four_forces:
      push: >
        Apres avoir effectue plusieurs depots et retraits dans la session,
        Marie ne peut pas savoir quelles operations ont ete enregistrees —
        elle voit seulement le solde final, pas l'historique.
      pull: >
        Une page de releve simple et lisible permettant de verifier
        chaque operation effectuee dans la session, avec son montant et sa date.
      anxiety: >
        Peur que les transactions affichees ne correspondent pas aux operations reellement
        enregistrees — qu'une operation soit perdue ou doublee sans que ca soit visible.
      habit: >
        Habitude de consulter les releves papier ou PDF de sa banque traditionnelle —
        l'affichage web doit etre aussi lisible et fiable que ce format familier.
    opportunity_score: 8
    stories:
      - slice-01-statement-api-and-ui
