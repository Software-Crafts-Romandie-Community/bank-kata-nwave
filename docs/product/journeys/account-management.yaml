schema_version: 1
created: 2026-06-02
updated: 2026-06-02
feature: phase1-account-management
pivot_note: >
  Remplace le parcours CLI (2026-06-02).
  Pivot vers application web bancaire standard — persona Marie, cliente bancaire grand public.

journey:
  name: "Gestion de compte bancaire — Phase 1 Web"
  goal: "Consulter son solde, deposer et retirer de l'argent depuis un navigateur"
  persona: "Marie — cliente bancaire, 35 ans, utilise le web pour ses finances quotidiennes"

  emotional_arc:
    start: "Curiosite — la page va-t-elle afficher mon vrai solde ?"
    middle: "Orientation puis Action — les formulaires sont clairs, j'ose cliquer"
    end: "Satisfaction et Confiance — le solde mis a jour confirme que ca a marche"

steps:
  - id: 1
    name: "Ouvrir le navigateur et charger la page"
    action: "Naviguer vers http://localhost:8080"
    web_mockup: |
      +-----------------------------------------------+
      | Bank — Gestion de compte          [localhost]  |
      +-----------------------------------------------+
      |                                               |
      |   Solde actuel                                |
      |   +-----------------------------------+       |
      |   |   0,00 EUR                        |       |
      |   +-----------------------------------+       |
      |                                               |
      |   [ Deposer ]     [ Retirer ]                 |
      |                                               |
      +-----------------------------------------------+
    shared_artifacts:
      - name: balance
        source: "Account domain object — expose via GET /api/balance"
        displayed_as: "${balance} EUR"
        consumers:
          - "Page HTML au chargement (fetch GET /api/balance)"
          - "Reponse JSON apres POST /api/deposit"
          - "Reponse JSON apres POST /api/withdraw"
          - "Message d'erreur fonds insuffisants"
    emotional_state:
      entry: "Curiosite — Marie ouvre la page pour la premiere fois"
      exit: "Orientation — le solde est visible, deux actions sont proposees"
    integration_checkpoint: |
      GET /api/balance repond 200 OK avec {"balance": "0.00"}
      La page HTML affiche correctement le montant recu.
    failure_modes:
      - "Serveur non demarre — erreur reseau navigateur"
      - "Reponse malformee — page affiche NaN ou vide"
      - "CORS bloque la requete fetch (si frontend servi separement)"
    gherkin: |
      Scenario: Le solde initial est visible au chargement de la page
        Given Marie ouvre son navigateur et charge http://localhost:8080
        When la page se charge completement
        Then Marie voit son solde affiche : "0,00 EUR"
        And deux boutons "Deposer" et "Retirer" sont visibles

  - id: 2
    name: "Saisir et valider un depot"
    action: "Cliquer sur 'Deposer', saisir un montant, confirmer"
    web_mockup: |
      +-----------------------------------------------+
      |   Deposer un montant                          |
      |   +-----------------------------------+       |
      |   | Montant : [  150,00         ]     |       |
      |   +-----------------------------------+       |
      |   [ Confirmer ]    [ Annuler ]                |
      |                                               |
      |   ✓ Depot de 150,00 EUR effectue.             |
      |   Nouveau solde : 150,00 EUR                  |
      +-----------------------------------------------+
    shared_artifacts:
      - name: balance
        source: "Account domain object — mis a jour apres deposit()"
        displayed_as: "${balance} EUR"
        consumers:
          - "Confirmation inline apres depot"
          - "Solde affiche en haut de page (rafraichi)"
    emotional_state:
      entry: "Action — Marie saisit un montant avec attention"
      exit: "Satisfaction — la confirmation est immediate, le solde est mis a jour"
    integration_checkpoint: |
      POST /api/deposit {"amount": "150.00"} repond 200 OK
      Reponse contient {"balance": "150.00"}
      Page affiche le nouveau solde sans rechargement complet
    failure_modes:
      - "Montant nul ou negatif saisi — reponse 400 Bad Request"
      - "Montant non numerique — validation frontend avant envoi"
    gherkin: |
      Scenario: Depot augmente le solde visible dans l'interface
        Given Marie a un solde de 0,00 EUR affiche dans le navigateur
        When Marie clique sur "Deposer", saisit 150,00 EUR et confirme
        Then la page affiche "Depot de 150,00 EUR effectue"
        And le solde affiche est mis a jour a 150,00 EUR

  - id: 3
    name: "Saisir et valider un retrait avec solde suffisant"
    action: "Cliquer sur 'Retirer', saisir un montant inferieur ou egal au solde, confirmer"
    web_mockup: |
      +-----------------------------------------------+
      |   Retirer un montant                          |
      |   +-----------------------------------+       |
      |   | Montant : [   50,00         ]     |       |
      |   +-----------------------------------+       |
      |   [ Confirmer ]    [ Annuler ]                |
      |                                               |
      |   ✓ Retrait de 50,00 EUR effectue.            |
      |   Nouveau solde : 100,00 EUR                  |
      +-----------------------------------------------+
    shared_artifacts:
      - name: balance
        source: "Account domain object — mis a jour apres withdraw()"
        displayed_as: "${balance} EUR"
        consumers:
          - "Confirmation inline apres retrait"
          - "Solde affiche en haut de page (rafraichi)"
    emotional_state:
      entry: "Attention — Marie verifie le montant avant de confirmer"
      exit: "Confiance — le retrait s'est effectue, le solde est correct"
    integration_checkpoint: |
      POST /api/withdraw {"amount": "50.00"} repond 200 OK
      Reponse contient {"balance": "100.00"}
      Page affiche le nouveau solde
    failure_modes:
      - "Montant superieur au solde — rejet 409 Conflict (voir step 4)"
      - "Montant nul ou negatif — reponse 400 Bad Request"
    gherkin: |
      Scenario: Retrait valide diminue le solde visible dans l'interface
        Given Marie a un solde de 150,00 EUR affiche dans le navigateur
        When Marie clique sur "Retirer", saisit 50,00 EUR et confirme
        Then la page affiche "Retrait de 50,00 EUR effectue"
        And le solde affiche est mis a jour a 100,00 EUR

  - id: 4
    name: "Tentative de retrait avec fonds insuffisants"
    action: "Cliquer sur 'Retirer', saisir un montant superieur au solde, confirmer"
    web_mockup: |
      +-----------------------------------------------+
      |   Retirer un montant                          |
      |   +-----------------------------------+       |
      |   | Montant : [  500,00         ]     |       |
      |   +-----------------------------------+       |
      |   [ Confirmer ]    [ Annuler ]                |
      |                                               |
      |   ✗ Fonds insuffisants.                       |
      |     Solde disponible : 100,00 EUR             |
      |     Demande : 500,00 EUR                      |
      |   Le solde reste inchange.                    |
      +-----------------------------------------------+
    shared_artifacts:
      - name: balance
        source: "Account domain object — inchange apres rejet"
        displayed_as: "${balance} EUR"
        consumers:
          - "Message d'erreur fonds insuffisants"
          - "Solde affiche (confirme inchange)"
    emotional_state:
      entry: "Incertitude — que va-t-il se passer si je retire plus que mon solde ?"
      exit: "Reassurance — le message est clair, le solde est intact, aucune donnee perdue"
    integration_checkpoint: |
      POST /api/withdraw {"amount": "500.00"} repond 409 Conflict
      Reponse contient {"error": "insufficient_funds", "balance": "100.00"}
      Page affiche le message d'erreur, solde inchange
    failure_modes:
      - "Solde modifie malgre le rejet (bug critique domaine)"
      - "Erreur 500 au lieu de 409 — reponse non structuree"
    gherkin: |
      Scenario: Retrait refuse si fonds insuffisants — solde inchange
        Given Marie a un solde de 100,00 EUR affiche dans le navigateur
        When Marie clique sur "Retirer", saisit 500,00 EUR et confirme
        Then la page affiche "Fonds insuffisants — solde disponible : 100,00 EUR"
        And le solde reste affiche a 100,00 EUR

integration_validation:
  shared_artifact_consistency:
    - artifact: balance
      must_match_across: [1, 2, 3, 4]
      failure_message: >
        Le solde affiche dans le navigateur doit toujours reflechir l'etat reel
        de Account apres chaque operation (depot, retrait, rejet).

changelog:
  - date: "2026-06-02"
    feature: "phase1-account-management"
    change: >
      Remplacement du parcours CLI par le parcours web bancaire standard.
      Pivot : persona developpeur -> Marie (cliente bancaire grand public).
      Interface : CLI stdin/stdout -> navigateur + REST API Spring Boot 3.x.
